<html>
 <head>
  <title>
   Prince Food Paradise
  </title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
 </head>
 <body class="bg-gray-100 p-6">
  <h1 class="text-4xl font-bold text-center text-green-600 mb-8">
   Prince Food Paradise
  </h1>
  <div class="flex justify-between">
   <div class="w-1/5 bg-white p-6 rounded-lg shadow-lg">
    <h2 class="text-2xl font-semibold mb-4">
     Administration Management
    </h2>
    <div class="mb-6">
     <h3 class="text-xl font-semibold mb-2">
      Add product/item
     </h3>
     <label class="block mb-2">
      Item Name
     </label>
     <input class="w-full p-2 mb-4 border rounded" id="add-item-name" type="text"/>
     <label class="block mb-2">
      Item Price
     </label>
     <input class="w-full p-2 mb-4 border rounded" id="add-item-price" type="number"/>
     <label class="block mb-2">
      Item Section
     </label>
     <input class="w-full p-2 mb-4 border rounded" id="add-item-section" type="text"/>
     <label class="block mb-2">
      Item Image URL
     </label>
     <input class="w-full p-2 mb-4 border rounded" id="add-item-image" type="text"/>
     <button class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700" onclick="addItem()">
      Add
     </button>
    </div>
    <div class="mb-6">
     <h3 class="text-xl font-semibold mb-2">
      Delete Item
     </h3>
     <label class="block mb-2">
      Item Name
     </label>
     <input class="w-full p-2 mb-4 border rounded" id="delete-item-name" type="text"/>
     <button class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700" onclick="deleteItem()">
      Delete
     </button>
    </div>
    <div>
     <h3 class="text-xl font-semibold mb-2">
      Update Item
     </h3>
     <label class="block mb-2">
      Old Item Name
     </label>
     <input class="w-full p-2 mb-4 border rounded" id="update-old-item-name" type="text"/>
     <label class="block mb-2">
      New Item Name
     </label>
     <input class="w-full p-2 mb-4 border rounded" id="update-new-item-name" type="text"/>
     <label class="block mb-2">
      Item Price
     </label>
     <input class="w-full p-2 mb-4 border rounded" id="update-item-price" type="number"/>
     <button class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700" onclick="updateItem()">
      Update
     </button>
    </div>
   </div>
   <div class="w-3/5 bg-white p-6 rounded-lg shadow-lg">
    <div class="mb-8">
     <h2 class="text-2xl font-semibold mb-4">
      Tiffin Section
     </h2>
     <div class="flex flex-wrap" id="tiffin-section">
      <div class="flex flex-col items-center m-4 p-4 bg-gray-50 rounded shadow" data-name="Dosa" data-price="30">
       <img alt="Image of Dosa" class="mb-2" height="50" src="https://storage.googleapis.com/a1aa/image/vYuqeOQSR7SbXydNzfsNw3yECntFRq9IdtBXRXr5ZCeOiZWnA.jpg" width="50"/>
       <span class="mb-2">
        Dosa 30 RS
       </span>
       <button class="bg-green-600 text-white p-2 rounded hover:bg-green-700" onclick="addToCart('Dosa', 30)">
        Add to cart
       </button>
      </div>
      <div class="flex flex-col items-center m-4 p-4 bg-gray-50 rounded shadow" data-name="Idly" data-price="30">
       <img alt="Image of Idly" class="mb-2" height="50" src="https://storage.googleapis.com/a1aa/image/DLsyflIfveR7SIjD0hnJOhQrtejbEzSNezyHypfnGX6jRMz6E.jpg" width="50"/>
       <span class="mb-2">
        Idly 30 RS
       </span>
       <button class="bg-green-600 text-white p-2 rounded hover:bg-green-700" onclick="addToCart('Idly', 30)">
        Add to cart
       </button>
      </div>
     </div>
    </div>
    <div class="mb-8">
     <h2 class="text-2xl font-semibold mb-4">
      Meals Section
     </h2>
     <div class="flex flex-wrap" id="meals-section">
      <div class="flex flex-col items-center m-4 p-4 bg-gray-50 rounded shadow" data-name="Half meals" data-price="30">
       <img alt="Image of Half meals" class="mb-2" height="50" src="https://storage.googleapis.com/a1aa/image/hrLmnmyQ5pYHOheGpDAgek2cDjV30ePSOvPd8FUEfwiqEzsOB.jpg" width="50"/>
       <span class="mb-2">
        Half meals 30 RS
       </span>
       <button class="bg-green-600 text-white p-2 rounded hover:bg-green-700" onclick="addToCart('Half meals', 30)">
        Add to cart
       </button>
      </div>
      <div class="flex flex-col items-center m-4 p-4 bg-gray-50 rounded shadow" data-name="Full meals" data-price="50">
       <img alt="Image of Full meals" class="mb-2" height="50" src="https://storage.googleapis.com/a1aa/image/rDqENu4FX45eSqbItka1sGgbJxiLBHVC14aWzKOWSBshYm1JA.jpg" width="50"/>
       <span class="mb-2">
        Full meals 50 RS
       </span>
       <button class="bg-green-600 text-white p-2 rounded hover:bg-green-700" onclick="addToCart('Full meals', 50)">
        Add to cart
       </button>
      </div>
      <div class="flex flex-col items-center m-4 p-4 bg-gray-50 rounded shadow" data-name="Mint Thali" data-price="40">
       <img alt="Image of Mint Thali" class="mb-2" height="50" src="https://storage.googleapis.com/a1aa/image/GmzOzfi8TX2Wek08MqSLQAruabHMKVCsOBcsasRp3joMxMrTA.jpg" width="50"/>
       <span class="mb-2">
        Mint Thali 40 RS
       </span>
       <button class="bg-green-600 text-white p-2 rounded hover:bg-green-700" onclick="addToCart('Mint Thali', 40)">
        Add to cart
       </button>
      </div>
     </div>
    </div>
    <div>
     <h2 class="text-2xl font-semibold mb-4">
      Fast Food Section
     </h2>
     <div class="flex flex-wrap" id="fast-food-section">
      <div class="flex flex-col items-center m-4 p-4 bg-gray-50 rounded shadow" data-name="Burger" data-price="40">
       <img alt="Image of Burger" class="mb-2" height="50" src="https://storage.googleapis.com/a1aa/image/rsTmxeFyeZkZNkBgW1gg2utLNIKL5v2VPXY1GVfLr4rSiZWnA.jpg" width="50"/>
       <span class="mb-2">
        Burger 40 RS
       </span>
       <button class="bg-green-600 text-white p-2 rounded hover:bg-green-700" onclick="addToCart('Burger', 40)">
        Add to cart
       </button>
      </div>
      <div class="flex flex-col items-center m-4 p-4 bg-gray-50 rounded shadow" data-name="Pizza" data-price="50">
       <img alt="Image of Pizza" class="mb-2" height="50" src="https://storage.googleapis.com/a1aa/image/Bfav4wKeTWjMwkH1Cp4xgCTR5JBAWPFamdEmCIeBoi0LiZWnA.jpg" width="50"/>
       <span class="mb-2">
        Pizza 50 RS
       </span>
       <button class="bg-green-600 text-white p-2 rounded hover:bg-green-700" onclick="addToCart('Pizza', 50)">
        Add to cart
       </button>
      </div>
     </div>
    </div>
   </div>
   <div class="w-1/5 bg-white p-6 rounded-lg shadow-lg">
    <h2 class="text-2xl font-semibold mb-4">
     Cart
    </h2>
    <div class="mb-4" id="cart-items">
    </div>
    <div class="flex justify-between items-center mb-4">
     <span class="text-xl font-semibold">
      Total:
     </span>
     <span class="text-xl font-semibold" id="total-price">
      0
     </span>
     RS
    </div>
    <div class="flex justify-between">
     <button class="bg-green-600 text-white p-2 rounded hover:bg-green-700" onclick="payBill()">
      Pay Bill
     </button>
     <button class="bg-green-600 text-white p-2 rounded hover:bg-green-700" onclick="printBill()">
      Print Bill
     </button>
    </div>
   </div>
  </div>
  <script>
   const cart = [];
        let total = 0;

        function addItem() {
            const name = document.getElementById("add-item-name").value;
            const price = parseFloat(document.getElementById("add-item-price").value);
            const section = document.getElementById("add-item-section").value;
            const image = document.getElementById("add-item-image").value;

            if (name && price && section && image) {
                const newItem = document.createElement("div");
                newItem.className = "flex flex-col items-center m-4 p-4 bg-gray-50 rounded shadow";
                newItem.setAttribute("data-name", name);
                newItem.setAttribute("data-price", price);
                newItem.innerHTML = `<img src="${image}" alt="Image of ${name}" class="mb-2" height="50" width="50"/> 
                                    <span class="mb-2">${name} ${price} RS</span>
                                    <button onclick="addToCart('${name}', ${price})" class="bg-green-600 text-white p-2 rounded hover:bg-green-700">Add to cart</button>`;
                
                document.getElementById(`${section.toLowerCase().replace(" ", "-")}-section`).appendChild(newItem);

                // Clear inputs
                document.getElementById("add-item-name").value = "";
                document.getElementById("add-item-price").value = "";
                document.getElementById("add-item-section").value = "";
                document.getElementById("add-item-image").value = "";
            } else {
                alert("Please fill in all fields.");
            }
        }

        function deleteItem() {
            const name = document.getElementById("delete-item-name").value;
            const sections = ["tiffin", "meals", "fast-food"];

            sections.forEach(section => {
                const itemDiv = document.querySelector(`#${section}-section .item[data-name="${name}"]`);
                if (itemDiv) {
                    itemDiv.remove();
                }
            });

            // Clear input
            document.getElementById("delete-item-name").value = "";
        }

        function updateItem() {
            const oldName = document.getElementById("update-old-item-name").value;
            const newName = document.getElementById("update-new-item-name").value;
            const price = parseFloat(document.getElementById("update-item-price").value);
            const sections = ["tiffin", "meals", "fast-food"];

            sections.forEach(section => {
                const itemDiv = document.querySelector(`#${section}-section .item[data-name="${oldName}"]`);
                if (itemDiv) {
                    if (newName) itemDiv.setAttribute("data-name", newName);
                    if (price) itemDiv.setAttribute("data-price", price);
                    itemDiv.querySelector("span").innerHTML = `${newName || oldName} ${price || itemDiv.getAttribute("data-price")} RS`;
                }
            });

            // Clear inputs
            document.getElementById("update-old-item-name").value = "";
            document.getElementById("update-new-item-name").value = "";
            document.getElementById("update-item-price").value = "";
        }

        function addToCart(name, price) {
            const itemIndex = cart.findIndex(item => item.name === name);

            if (itemIndex === -1) {
                cart.push({ name, price, quantity: 1 });
            } else {
                cart[itemIndex].quantity += 1;
            }

            updateCartDisplay();
        }

        function updateCartDisplay() {
            const cartItemsDiv = document.getElementById("cart-items");
            cartItemsDiv.innerHTML = "";

            total = 0;

            cart.forEach(item => {
                total += item.price * item.quantity;
                const itemDiv = document.createElement("div");
                itemDiv.className = "flex justify-between items-center mb-4";
                itemDiv.innerHTML = `${item.name} (₹${item.price}) x ${item.quantity} 
                                    <button onclick="removeFromCart('${item.name}')" class="bg-red-600 text-white p-2 rounded hover:bg-red-700">Remove</button>`;
                cartItemsDiv.appendChild(itemDiv);
            });

            document.getElementById("total-price").textContent = total.toFixed(2);
        }

        function removeFromCart(name) {
            const itemIndex = cart.findIndex(item => item.name === name);

            if (itemIndex !== -1) {
                cart[itemIndex].quantity -= 1;

                if (cart[itemIndex].quantity === 0) {
                    cart.splice(itemIndex, 1);
                }
            }

            updateCartDisplay();
        }

        function payBill() {
            alert(`Total amount to be paid: ₹${total.toFixed(2)}`);
            // Reset cart after payment
            cart.length = 0;
            updateCartDisplay();
        }

        function printBill() {
            let bill = "Bill:\n\n";
            cart.forEach(item => {
                bill += `${item.name} - ₹${item.price} x ${item.quantity} = ₹${(item.price * item.quantity).toFixed(2)}\n`;
            });
            bill += `\nTotal: ₹${total.toFixed(2)}`;

            // Print bill
            const printWindow = window.open("", "_blank");
            printWindow.document.write(`<pre>${bill}</pre>`);
            printWindow.document.close();
            printWindow.print();
        }
  </script>
 </body>
</html>
